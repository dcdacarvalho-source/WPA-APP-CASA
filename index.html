<style>
  :root {
    --cream: #F7F3EE;
    --warm: #EDE4D8;
    --blush: #C9A98A;
    --terracotta: #A05C3B;
    --dark: #2A1F1A;
    --mid: #6B4F3A;
    --light-text: #9C7B65;
    --check-green: #5A8A5A;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--dark);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* INSTALL BANNER */
  #install-banner {
    display: none;
    position: fixed;
    bottom: calc(16px + var(--safe-bottom));
    left: 16px; right: 16px;
    background: var(--dark);
    color: var(--cream);
    border-radius: 16px;
    padding: 16px 20px;
    z-index: 1000;
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    align-items: center;
    gap: 14px;
    animation: slideUp 0.4s ease;
  }
  #install-banner.show { display: flex; }
  @keyframes slideUp {
    from { transform: translateY(80px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .install-icon { font-size: 28px; flex-shrink: 0; }
  .install-text { flex: 1; }
  .install-text strong { display: block; font-size: 14px; color: var(--cream); }
  .install-text span { font-size: 12px; color: var(--blush); }
  .install-btn {
    background: var(--blush);
    color: var(--dark);
    border: none;
    padding: 10px 18px;
    border-radius: 99px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    flex-shrink: 0;
  }
  .install-close {
    background: none;
    border: none;
    color: var(--light-text);
    font-size: 18px;
    cursor: pointer;
    padding: 4px;
    flex-shrink: 0;
  }

  /* OFFLINE BADGE */
  #offline-badge {
    display: none;
    position: fixed;
    top: calc(12px + var(--safe-top));
    left: 50%;
    transform: translateX(-50%);
    background: #a03b3b;
    color: white;
    font-size: 11px;
    letter-spacing: 1px;
    padding: 6px 16px;
    border-radius: 99px;
    z-index: 999;
  }
  #offline-badge.show { display: block; }

  /* HERO */
  .hero {
    background: var(--dark);
    padding: calc(60px + var(--safe-top)) 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(201,169,138,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 50%, rgba(160,92,59,0.1) 0%, transparent 60%);
  }
  .hero-eyebrow {
    font-size: 11px; font-weight: 500;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--blush); margin-bottom: 16px; position: relative;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 6vw, 52px);
    color: var(--cream); line-height: 1.1; position: relative;
  }
  .hero h1 em { color: var(--blush); font-style: italic; }
  .hero-sub { margin-top: 16px; color: var(--light-text); font-size: 14px; position: relative; }

  /* STATS BAR */
  .stats-bar {
    background: var(--blush);
    display: flex; justify-content: center;
    gap: 40px; padding: 16px 24px; flex-wrap: wrap;
  }
  .stat { text-align: center; }
  .stat-num { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--dark); }
  .stat-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--dark); opacity: 0.7; }

  /* LAYOUT */
  .container {
    max-width: 900px; margin: 0 auto;
    padding: 40px 20px calc(80px + var(--safe-bottom));
  }

  /* PROGRESS */
  .progress-section {
    background: white; border-radius: 16px; padding: 24px;
    margin-bottom: 36px; box-shadow: 0 2px 20px rgba(42,31,26,0.06);
  }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .progress-title { font-size: 13px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--mid); }
  .progress-count { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--terracotta); }
  .progress-bar-bg { height: 8px; background: var(--warm); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blush), var(--terracotta));
    border-radius: 99px; transition: width 0.5s ease; width: 0%;
  }

  /* CATEGORY */
  .category { margin-bottom: 28px; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 16px rgba(42,31,26,0.06); }
  .category-header {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 22px; background: var(--dark);
    cursor: pointer; user-select: none; transition: background 0.2s;
  }
  .category-header:active { background: #3a2b24; }
  .cat-icon {
    width: 38px; height: 38px; background: rgba(201,169,138,0.15);
    border-radius: 10px; display: flex; align-items: center;
    justify-content: center; font-size: 18px; flex-shrink: 0;
  }
  .cat-info { flex: 1; }
  .cat-name { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--cream); }
  .cat-meta { font-size: 11px; color: var(--blush); margin-top: 2px; }
  .cat-toggle { color: var(--blush); font-size: 18px; transition: transform 0.3s; }
  .category.open .cat-toggle { transform: rotate(180deg); }
  .category-body { background: white; display: none; }
  .category.open .category-body { display: block; }

  /* SUBCATEGORY */
  .subcategory { border-bottom: 1px solid var(--warm); }
  .subcategory:last-child { border-bottom: none; }
  .sub-header {
    padding: 12px 22px 8px; font-size: 10px; font-weight: 500;
    letter-spacing: 3px; text-transform: uppercase; color: var(--blush);
    background: #faf7f4; border-bottom: 1px solid var(--warm);
  }

  /* ITEM */
  .item {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 12px 22px; border-bottom: 1px solid rgba(237,228,216,0.5);
    transition: background 0.15s; cursor: pointer;
  }
  .item:last-child { border-bottom: none; }
  .item:active { background: #fdf9f5; }
  .item.checked { opacity: 0.55; }
  .item.checked .item-name { text-decoration: line-through; color: var(--light-text); }
  .checkbox {
    width: 20px; height: 20px; border: 2px solid var(--blush);
    border-radius: 6px; flex-shrink: 0; margin-top: 2px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .item.checked .checkbox { background: var(--check-green); border-color: var(--check-green); }
  .checkbox-tick { color: white; font-size: 12px; display: none; }
  .item.checked .checkbox-tick { display: block; }
  .item-content { flex: 1; }
  .item-name { font-size: 14px; font-weight: 400; color: var(--dark); line-height: 1.4; }
  .item-note { font-size: 12px; color: var(--light-text); margin-top: 2px; }
  .item-priority {
    font-size: 10px; padding: 2px 8px; border-radius: 99px;
    font-weight: 500; flex-shrink: 0; margin-top: 3px;
  }
  .priority-essential { background: #fde8e0; color: #a03b3b; }
  .priority-importante { background: #fff3e0; color: #a06020; }
  .priority-opcional { background: #e8f5e9; color: #2e7d32; }

  /* RESET */
  .reset-btn {
    display: block; margin: 40px auto 0; background: none;
    border: 2px solid var(--blush); color: var(--blush);
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    letter-spacing: 2px; text-transform: uppercase;
    padding: 12px 32px; border-radius: 99px; cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:active { background: var(--blush); color: white; }

  @media (hover: hover) {
    .category-header:hover { background: #3a2b24; }
    .item:hover { background: #fdf9f5; }
    .reset-btn:hover { background: var(--blush); color: white; }
  }

  @media (max-width: 600px) {
    .stats-bar { gap: 20px; }
    .category-header { padding: 14px 16px; }
    .item { padding: 10px 16px; }
    .sub-header { padding: 10px 16px 6px; }
  }
</style>
</head>

// ── STATE ──────────────────────────────────────────────────────────────────
let checkedItems = {};

function renderAll() {
  const container = document.getElementById('categories');
  container.innerHTML = '';
  data.forEach(cat => {
    const div = document.createElement('div');
    div.className = 'category';
    div.id = 'cat-' + cat.id;
    const totalItems = cat.subcats.reduce((a,s) => a + s.items.length, 0);
    const checkedCount = cat.subcats.reduce((a,s) => a + s.items.filter(i => checkedItems[cat.id+'|'+s.name+'|'+i.name]).length, 0);
    div.innerHTML = `
      <div class="category-header" onclick="toggleCat('${cat.id}')">
        <div class="cat-icon">${cat.icon}</div>
        <div class="cat-info">
          <div class="cat-name">${cat.name}</div>
          <div class="cat-meta">${cat.desc} · ${checkedCount}/${totalItems} itens</div>
        </div>
        <div class="cat-toggle">▾</div>
      </div>
      <div class="category-body">
        ${cat.subcats.map(sub => `
          <div class="subcategory">
            <div class="sub-header">${sub.name}</div>
            ${sub.items.map(item => {
              const key = cat.id+'|'+sub.name+'|'+item.name;
              const checked = checkedItems[key] ? 'checked' : '';
              const pLabel = item.p === 'essential' ? 'Essencial' : item.p === 'importante' ? 'Importante' : 'Opcional';
              return `<div class="item ${checked}" onclick="toggleItem('${key.replace(/'/g,"\\'")}', this)">
                <div class="checkbox"><span class="checkbox-tick">✓</span></div>
                <div class="item-content">
                  <div class="item-name">${item.name}</div>
                  ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
                </div>
                <span class="item-priority priority-${item.p}">${pLabel}</span>
              </div>`;
            }).join('')}
          </div>`).join('')}
      </div>`;
    container.appendChild(div);
  });
  updateStats();
}

function toggleCat(id) {
  document.getElementById('cat-'+id).classList.toggle('open');
}

function toggleItem(key, el) {
  checkedItems[key] = !checkedItems[key];
  el.classList.toggle('checked');
  saveToStorage();
  updateStats();
  data.forEach(cat => {
    const totalItems = cat.subcats.reduce((a,s) => a + s.items.length, 0);
    const checkedCount = cat.subcats.reduce((a,s) => a + s.items.filter(i => checkedItems[cat.id+'|'+s.name+'|'+i.name]).length, 0);
    const catEl = document.getElementById('cat-'+cat.id);
    if (catEl) catEl.querySelector('.cat-meta').textContent = `${cat.desc} · ${checkedCount}/${totalItems} itens`;
  });
}

function updateStats() {
  const total = data.reduce((a,c) => a + c.subcats.reduce((b,s) => b + s.items.length, 0), 0);
  const checked = Object.values(checkedItems).filter(Boolean).length;
  const pct = total > 0 ? Math.round(checked/total*100) : 0;
  document.getElementById('total-count').textContent = total;
  document.getElementById('checked-count').textContent = checked;
  document.getElementById('remaining-count').textContent = total - checked;
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

function saveToStorage() {
  try { localStorage.setItem('casa_checklist', JSON.stringify(checkedItems)); } catch(e){}
}

function loadFromStorage() {
  try {
    const saved = localStorage.getItem('casa_checklist');
    if (saved) checkedItems = JSON.parse(saved);
  } catch(e){}
}

function resetAll() {
  if (confirm('Tem certeza que quer reiniciar toda a lista?')) {
    checkedItems = {};
    saveToStorage();
    renderAll();
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadFromStorage();
renderAll();
document.querySelector('.category').classList.add('open');

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── OFFLINE DETECTION ─────────────────────────────────────────────────────
function updateOnlineStatus() {
  document.getElementById('offline-badge').classList.toggle('show', !navigator.onLine);
}
window.addEventListener('online', updateOnlineStatus);
window.addEventListener('offline', updateOnlineStatus);
updateOnlineStatus();

// ── INSTALL PROMPT ────────────────────────────────────────────────────────
let deferredPrompt = null;
const banner = document.getElementById('install-banner');
const installBtn = document.getElementById('install-btn');
const installClose = document.getElementById('install-close');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  setTimeout(() => banner.classList.add('show'), 2000);
});

installBtn.addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  banner.classList.remove('show');
});

installClose.addEventListener('click', () => banner.classList.remove('show'));

window.addEventListener('appinstalled', () => {
  banner.classList.remove('show');
  deferredPrompt = null;
});
</script>
